version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: metart-server
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - ./server/config.env
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: metart-client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true # Required for create-react-app
    tty: true
    depends_on:
      - server
    restart: unless-stopped
