<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf8ff"/>
      <stop offset="55%" stop-color="#f4efff"/>
      <stop offset="100%" stop-color="#eefdfb"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d4bd1"/>
      <stop offset="55%" stop-color="#8f63f4"/>
      <stop offset="100%" stop-color="#16a394"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#6b5c82" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b5ce1"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a394"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f28a4b"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 54px; font-weight: 800; fill: #1f1730; }
      .subtitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 23px; font-weight: 500; fill: #6d617d; }
      .section { font-family: "Segoe UI", Arial, sans-serif; font-size: 19px; font-weight: 800; letter-spacing: 1.4px; fill: #6e4fd5; }
      .boxTitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #21162f; }
      .boxText { font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #5b5069; }
      .small { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #6d617d; }
      .tag { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #ffffff; }
      .card { fill: #ffffff; stroke: #ded3f2; stroke-width: 2; rx: 24; filter: url(#shadow); }
      .softCard { fill: #ffffff; stroke: #e7def6; stroke-width: 2; rx: 20; }
      .lane { fill: rgba(255,255,255,0.68); stroke: #eadff8; stroke-width: 2; rx: 28; }
      .arrowP { stroke: #7b5ce1; stroke-width: 4; fill: none; marker-end: url(#arrowPurple); stroke-linecap: round; stroke-linejoin: round; }
      .arrowT { stroke: #16a394; stroke-width: 4; fill: none; marker-end: url(#arrowTeal); stroke-linecap: round; stroke-linejoin: round; }
      .arrowO { stroke: #f28a4b; stroke-width: 4; fill: none; marker-end: url(#arrowOrange); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 10; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <circle cx="1340" cy="120" r="210" fill="#dff7f4" opacity="0.55"/>
  <circle cx="260" cy="790" r="230" fill="#efe6ff" opacity="0.72"/>

  <text x="80" y="88" class="section">METART ARCHITECTURE</text>
  <text x="80" y="152" class="title">AI-Powered Digital Art Marketplace</text>
  <text x="82" y="196" class="subtitle">A protected creator-to-collector flow for upload, watermarking, auctions, chat, payments, and dashboards.</text>

  <rect x="70" y="245" width="1460" height="520" class="lane"/>

  <text x="110" y="292" class="section">CLIENT EXPERIENCE</text>
  <text x="514" y="292" class="section">BACKEND CORE</text>
  <text x="908" y="292" class="section">INTELLIGENCE + MEDIA</text>
  <text x="1252" y="292" class="section">DATA + COMMERCE</text>

  <g id="users">
    <rect x="105" y="333" width="230" height="150" class="card"/>
    <circle cx="145" cy="373" r="20" fill="#8f63f4"/>
    <text x="180" y="374" class="boxTitle">Users</text>
    <text x="130" y="420" class="boxText">Artists upload art</text>
    <text x="130" y="448" class="boxText">Buyers browse, bid</text>
    <text x="130" y="476" class="boxText">Admins manage trust</text>
  </g>

  <g id="frontend">
    <rect x="385" y="333" width="270" height="150" class="card"/>
    <circle cx="425" cy="373" r="20" fill="#7b5ce1"/>
    <text x="460" y="374" class="boxTitle">React Frontend</text>
    <text x="410" y="420" class="boxText">Marketplace UI</text>
    <text x="410" y="448" class="boxText">Upload + AI co-pilot</text>
    <text x="410" y="476" class="boxText">Cart, checkout, profile</text>
  </g>

  <g id="api">
    <rect x="720" y="333" width="270" height="150" class="card"/>
    <circle cx="760" cy="373" r="20" fill="#f28a4b"/>
    <text x="795" y="374" class="boxTitle">Express API</text>
    <text x="745" y="420" class="boxText">JWT auth + roles</text>
    <text x="745" y="448" class="boxText">Art, order, admin routes</text>
    <text x="745" y="476" class="boxText">Controller orchestration</text>
  </g>

  <g id="ai">
    <rect x="1065" y="333" width="295" height="150" class="card"/>
    <circle cx="1105" cy="373" r="20" fill="#16a394"/>
    <text x="1140" y="374" class="boxTitle">AI Vision Pipeline</text>
    <text x="1090" y="420" class="boxText">OpenAI GPT-4o analysis</text>
    <text x="1090" y="448" class="boxText">Title, tags, bid, copy</text>
    <text x="1090" y="476" class="boxText">Fallback simulation</text>
  </g>

  <g id="sharp">
    <rect x="1065" y="548" width="295" height="150" class="card"/>
    <circle cx="1105" cy="588" r="20" fill="#6d4bd1"/>
    <text x="1140" y="589" class="boxTitle">Sharp Watermark</text>
    <text x="1090" y="635" class="boxText">Dynamic gravity position</text>
    <text x="1090" y="663" class="boxText">Protected preview overlay</text>
    <text x="1090" y="691" class="boxText">Cloudinary-ready image</text>
  </g>

  <g id="database">
    <rect x="720" y="548" width="270" height="150" class="card"/>
    <circle cx="760" cy="588" r="20" fill="#7b5ce1"/>
    <text x="795" y="589" class="boxTitle">MongoDB</text>
    <text x="745" y="635" class="boxText">Users, artworks, orders</text>
    <text x="745" y="663" class="boxText">Chats and auction records</text>
    <text x="745" y="691" class="boxText">Mongoose schemas</text>
  </g>

  <g id="realtime">
    <rect x="385" y="548" width="270" height="150" class="card"/>
    <circle cx="425" cy="588" r="20" fill="#16a394"/>
    <text x="460" y="589" class="boxTitle">Realtime Layer</text>
    <text x="410" y="635" class="boxText">Socket.IO chat</text>
    <text x="410" y="663" class="boxText">Live auction bidding</text>
    <text x="410" y="691" class="boxText">Creator-collector DMs</text>
  </g>

  <g id="commerce">
    <rect x="105" y="548" width="230" height="150" class="card"/>
    <circle cx="145" cy="588" r="20" fill="#f28a4b"/>
    <text x="180" y="589" class="boxTitle">Payments</text>
    <text x="130" y="635" class="boxText">Stripe checkout</text>
    <text x="130" y="663" class="boxText">Khalti payments</text>
    <text x="130" y="691" class="boxText">Direct monetization</text>
  </g>

  <path d="M335 408 H385" class="arrowP"/>
  <path d="M655 408 H720" class="arrowO"/>
  <path d="M990 408 H1065" class="arrowT"/>
  <path d="M1212 483 V548" class="arrowT"/>
  <path d="M1065 623 H990" class="arrowP"/>
  <path d="M720 623 H655" class="arrowT"/>
  <path d="M385 623 H335" class="arrowO"/>

  <path d="M855 483 V548" class="arrowP dash"/>
  <path d="M520 483 V548" class="arrowT dash"/>
  <path d="M220 548 V510 C220 498,235 493,250 493 H720" class="arrowO dash"/>

  <g transform="translate(85 800)">
    <rect width="1430" height="58" rx="29" fill="#ffffff" stroke="#e1d6f2" stroke-width="2"/>
    <circle cx="36" cy="29" r="11" fill="#8f63f4"/>
    <text x="60" y="36" class="small">Core value flow:</text>
    <text x="184" y="36" class="boxText">Upload -> AI appraisal -> watermark -> publish -> auction/chat -> checkout</text>
    <text x="1485" y="36" class="small" text-anchor="end">Stack: MERN + OpenAI + Sharp + Cloudinary + Socket.IO</text>
  </g>
</svg>
